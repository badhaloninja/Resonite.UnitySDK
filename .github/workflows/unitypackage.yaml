name: 'Build UnityPackage.'

on:
  workflow_dispatch:
  release:
    types:
      - published
  # DEBUG
  push:

jobs:
  make-unitypackage:
    runs-on: ubuntu-latest

    name: 'Build UnityPackage.'

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          lfs: 'true'

    - name: 'setup Unity'
      if: steps.cache.outputs.cache-hit != 'true'
      uses: buildalon/unity-setup@v2
      with:
        unity-version: '6000.3.10f1'
        cache-installation: 'true'

    - name: 'Build Package'
      run: ${{ steps.unity-setup.outputs.unity-editor-path }}/Unity -quit -batchmode -nographics -projectPath $(pwd) -executeMethod ResoniteSDK_Builder.BuildUnityPackage

    - name: 'Upload packages'
      uses: actions/upload-artifact@v7
      with:
        name: 'Resonite.UnitySDK'
        path: Builds/*.unitypackage
